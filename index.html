<script>
let carrito=[];

const cont=document.getElementById("productos");
const lista=document.getElementById("lista");
const totalEl=document.getElementById("total");
const wa=document.getElementById("wa"); // ⚠️ asegúrate de tener este elemento

function render(listaProd){
  cont.innerHTML="";
  listaProd.forEach(p=>{
    let d=document.createElement("div");
    d.className="producto";
    d.innerHTML=`
      <img src="${imagenes[p.name]}">
      <h4>${p.name}</h4>
      <p class="precio">$${p.precio}</p>
      <button onclick="agregar('${p.name}',${p.precio})">Comprar</button>
    `;
    cont.appendChild(d);
  });
}

function filtrar(){
  let t=document.getElementById("buscador").value.toLowerCase();
  render(productos.filter(p=>p.name.toLowerCase().includes(t)));
}

function agregar(n,p){
  carrito.push({n,p});
  actualizar();
}

function actualizar(){
  lista.innerHTML="";
  let total=0;

  carrito.forEach(i=>{
    let li=document.createElement("li");
    li.textContent=i.n+" $"+i.p;
    lista.appendChild(li);
    total+=i.p;
  });

  totalEl.textContent=total;

  let msg="Hola quiero comprar:%0A";
  carrito.forEach(i=>msg+=`- ${i.n} $${i.p}%0A`);
  msg+=`Total: $${total}`;

  if(wa){
    wa.href=`https://wa.me/5215638633646?text=${msg}`;
  }
}

render(productos);
</script>
